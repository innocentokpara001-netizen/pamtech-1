[build]
  command = "npm run build:netlify"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

[[redirects]]
  from = "/foundation"
  to = "/impact/foundations"
  status = 301

[[redirects]]
  from = "/foundations"
  to = "/impact/foundations"
  status = 301
